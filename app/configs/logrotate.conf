# Logrotate configuration for PromptHub audit logs
#
# Installation (macOS):
#   sudo cp configs/logrotate.conf /etc/newsyslog.d/prompthub.conf
#   sudo newsyslog -v  # Test configuration
#
# Installation (Linux):
#   sudo cp configs/logrotate.conf /etc/logrotate.d/prompthub
#   sudo logrotate -d /etc/logrotate.d/prompthub  # Test configuration
#
# Note: This file uses logrotate syntax. For macOS newsyslog, see logrotate-macos.conf
# Note: Update the path below if DATA_DIR is overridden (default: ~/.prompthub)

# ~/.prompthub/audit.log
/Users/visualval/.prompthub/audit.log {
    # Rotate daily
    daily

    # Keep 90 days of logs
    rotate 90

    # Compress old logs
    compress
    delaycompress

    # Don't error if log file is missing
    missingok

    # Don't rotate if empty
    notifempty

    # Create new log with these permissions
    create 0644 visualval staff

    # Use date as a suffix (audit.log-20260128)
    dateext
    dateformat -%Y%m%d

    # Post-rotation script
    postrotate
        # Send SIGHUP to router if running (optional)
        # pkill -HUP -f "uvicorn router.main:app" || true
    endscript
}

# SQLite database doesn't need rotation
# ~/.prompthub/activity.db is self-managed with cleanup API
