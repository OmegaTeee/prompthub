openapi: 3.0.3
info:
  title: PromptHub Router API
  version: 0.1.0
  description: |
    Centralized MCP router with server management, prompt enhancement, and caching.

    ## Features
    - MCP server lifecycle management (install, start, stop, monitor)
    - Unified MCP server access via JSON-RPC proxy
    - Prompt enhancement via local LLM server with per-client routing
    - Response caching (L1 in-memory; L2 semantic planned)
    - Circuit breaker resilience patterns
    - Real-time monitoring dashboard
    - Audit logging and security alerts

  contact:
    name: PromptHub Project
    url: https://github.com/OmegaTeee/prompthub
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:9090
    description: Local development server

tags:
  - name: Health
    description: Health check and status endpoints
  - name: Servers
    description: MCP server lifecycle management
  - name: MCP Proxy
    description: JSON-RPC proxy to MCP servers
  - name: Enhancement
    description: Prompt enhancement via local LLM server
  - name: OpenAI Proxy
    description: OpenAI-compatible API for desktop apps (Cursor, Raycast, Obsidian)
  - name: Circuit Breakers
    description: Resilience pattern management
  - name: Audit
    description: Activity logging and security monitoring
  - name: Configs
    description: Client configuration generators
  - name: Dashboard
    description: Real-time monitoring UI

paths:
  /health:
    get:
      summary: System health check
      description: Returns status of all services including router, LLM server, cache, and MCP servers
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                services:
                  router: up
                  llm_server: up
                  cache:
                    status: up
                    hit_rate: 0.82
                    size: 145
                servers:
                  running: 5
                  stopped: 2
                  failed: 0

  /health/{server}:
    get:
      summary: Server-specific health check
      description: Get health status and details for a specific MCP server
      operationId: serverHealth
      tags:
        - Health
      parameters:
        - name: server
          in: path
          required: true
          description: MCP server name (e.g., "context7", "fetch")
          schema:
            type: string
      responses:
        '200':
          description: Server health information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerHealthResponse'
        '404':
          description: Server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Server registry not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /servers:
    get:
      summary: List all MCP servers
      description: Get list of all configured MCP servers with their current status
      operationId: listServers
      tags:
        - Servers
      responses:
        '200':
          description: List of servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServerInfo'
        '503':
          description: Server registry not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /servers/{name}:
    get:
      summary: Get server details
      description: Get detailed configuration and status for a specific MCP server
      operationId: getServer
      tags:
        - Servers
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerDetail'
        '404':
          description: Server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Remove server
      description: Remove a server configuration (must be stopped first)
      operationId: removeServer
      tags:
        - Servers
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Server fetch removed"
        '400':
          description: Cannot remove running server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /servers/{name}/start:
    post:
      summary: Start server
      description: Start a stopped MCP server
      operationId: startServer
      tags:
        - Servers
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: string
                    example: running
        '400':
          description: Server already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to start server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /servers/{name}/stop:
    post:
      summary: Stop server
      description: Stop a running MCP server
      operationId: stopServer
      tags:
        - Servers
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server stopped
        '400':
          description: Server not running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /servers/{name}/restart:
    post:
      summary: Restart server
      description: Restart an MCP server and reset its circuit breaker
      operationId: restartServer
      tags:
        - Servers
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server restarted
        '500':
          description: Failed to restart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /servers/install:
    post:
      summary: Install new MCP server
      description: Install and configure a new MCP server from npm package
      operationId: installServer
      tags:
        - Servers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallServerRequest'
      responses:
        '200':
          description: Server installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  name:
                    type: string
                  package:
                    type: string
        '400':
          description: Server already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mcp/{server}/{path}:
    post:
      summary: Proxy JSON-RPC to MCP server
      description: |
        Forward JSON-RPC requests to MCP servers. The server is auto-started if configured
        with `auto_start: true`. Circuit breaker protects against cascading failures.
      operationId: mcpProxy
      tags:
        - MCP Proxy
      parameters:
        - name: server
          in: path
          required: true
          description: Target MCP server name
          schema:
            type: string
          example: context7
        - name: path
          in: path
          required: true
          description: MCP endpoint path
          schema:
            type: string
          example: tools/call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonRpcRequest'
      responses:
        '200':
          description: JSON-RPC response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
        '404':
          description: Server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcError'
        '503':
          description: Server unavailable or circuit breaker open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcError'

  /llm/enhance:
    post:
      summary: Enhance prompt
      description: |
        Enhance a prompt using the local LLM server. PromptHub uses one
        enhancement model for all clients (`qwen3-4b-instruct-2507`) and
        changes behavior through per-client system prompts, token limits, and
        privacy rules selected by the `X-Client-Name` header.
      operationId: enhancePrompt
      tags:
        - Enhancement
      parameters:
        - name: X-Client-Name
          in: header
          required: false
          description: Client identifier for enhancement-rule selection
          schema:
            type: string
            example: claude-desktop
          example: claude-desktop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnhanceRequest'
      responses:
        '200':
          description: Enhancement result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhanceResponse'
        '503':
          description: Enhancement service not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /llm/stats:
    get:
      summary: Enhancement statistics
      description: Get cache stats, hit rates, and LLM server health
      operationId: enhancementStats
      tags:
        - Enhancement
      responses:
        '200':
          description: Enhancement statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  cache:
                    type: object
                    properties:
                      hits:
                        type: integer
                      misses:
                        type: integer
                      size:
                        type: integer
                      hit_rate:
                        type: number
                        format: float
                  llm_healthy:
                    type: boolean

  /circuit-breakers:
    get:
      summary: List all circuit breakers
      description: Get state and statistics for all circuit breakers
      operationId: listCircuitBreakers
      tags:
        - Circuit Breakers
      responses:
        '200':
          description: Circuit breaker states
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/CircuitBreakerStats'

  /circuit-breakers/{name}/reset:
    post:
      summary: Reset circuit breaker
      description: Force reset a circuit breaker to CLOSED state
      operationId: resetCircuitBreaker
      tags:
        - Circuit Breakers
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Circuit breaker reset
        '404':
          description: Circuit breaker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/chat/completions:
    post:
      summary: Chat completion (OpenAI-compatible)
      description: |
        OpenAI-compatible chat completion endpoint for desktop apps. Authenticates via
        bearer token, optionally enhances the last user message using the per-client
        enhancement pipeline, and forwards to the LLM server. Supports both streaming (SSE)
        and non-streaming responses.

        Enhancement behavior is controlled by the API key config:
        - `enhance: true` — last user message is enhanced before forwarding
        - `enhance: false` — request is forwarded as-is (pass-through)

        System messages and conversation history are never modified.
      operationId: chatCompletions
      tags:
        - OpenAI Proxy
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
            example:
              model: "qwen3-4b-instruct-2507"
              messages:
                - role: system
                  content: "You are a helpful assistant."
                - role: user
                  content: "Explain circuit breakers in distributed systems"
              temperature: 0.7
              stream: false
      responses:
        '200':
          description: Chat completion response (JSON if stream=false, SSE if stream=true)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of ChatCompletionChunk objects, ending with `data: [DONE]`
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'
              example:
                error:
                  message: "Invalid API key"
                  type: "invalid_request_error"
        '502':
          description: LLM server unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'
        '503':
          description: Circuit breaker open (LLM server temporarily unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'
              example:
                error:
                  message: "Service temporarily unavailable — LLM server circuit breaker open"
                  type: "server_error"

  /v1/models:
    get:
      summary: List available models
      description: Returns available local models in OpenAI-compatible format.
      operationId: listModels
      tags:
        - OpenAI Proxy
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: "list"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "qwen3-4b-instruct-2507"
                        object:
                          type: string
                          example: "model"
        '401':
          description: Missing or invalid bearer token
        '502':
          description: Cannot reach LLM server

  /v1/api-keys/reload:
    post:
      summary: Reload API keys
      description: Hot-reload API key configuration from disk. Admin endpoint (no auth required).
      operationId: reloadApiKeys
      tags:
        - OpenAI Proxy
      responses:
        '200':
          description: Keys reloaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "API keys reloaded"
                  count:
                    type: integer
                    example: 5

  /v1/responses:
    post:
      summary: Responses API (OpenAI-compatible)
      description: |
        OpenAI Responses API endpoint. PromptHub translates Responses-format
        input into Chat Completions messages, optionally enhances the final
        user message, forwards the request to the local LLM server, and wraps
        the result back into Responses API format.

        Streaming is not supported on this endpoint.
      operationId: responses
      tags:
        - OpenAI Proxy
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsesRequest'
            example:
              model: "qwen3-4b-instruct-2507"
              instructions: "Answer concisely."
              input: "Summarize the purpose of circuit breakers."
              max_output_tokens: 300
              stream: false
      responses:
        '200':
          description: Responses API response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesResponse'
        '400':
          description: Invalid request shape or unsupported streaming mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'
        '502':
          description: LLM server unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'
        '503':
          description: Circuit breaker open (LLM server temporarily unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIError'

  /llm/reset:
    post:
      summary: Reset enhancement service
      description: Reset the enhancement service cache and statistics
      operationId: resetEnhancement
      tags:
        - Enhancement
      responses:
        '200':
          description: Enhancement service reset

  /audit/activity:
    get:
      summary: Query activity log
      description: Query HTTP request activity log with filters
      operationId: queryActivity
      tags:
        - Audit
      parameters:
        - name: method
          in: query
          schema:
            type: string
            enum: [GET, POST, PUT, DELETE, PATCH]
        - name: status_min
          in: query
          schema:
            type: integer
        - name: status_max
          in: query
          schema:
            type: integer
        - name: client_id
          in: query
          schema:
            type: string
        - name: request_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Activity log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogResponse'
    delete:
      summary: Clear activity log
      description: Delete all activity log entries
      operationId: clearActivityLog
      tags:
        - Audit
      responses:
        '200':
          description: Activity log cleared

  /audit/activity/stats:
    get:
      summary: Activity statistics
      description: Get aggregate statistics for activity log
      operationId: activityStats
      tags:
        - Audit
      responses:
        '200':
          description: Activity statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_entries:
                    type: integer
                  by_method:
                    type: object
                    additionalProperties:
                      type: integer
                  by_status:
                    type: object
                    additionalProperties:
                      type: integer

  /audit/activity/cleanup:
    post:
      summary: Clean up old activity entries
      description: Delete activity log entries older than the specified number of days
      operationId: cleanupActivity
      tags:
        - Audit
      parameters:
        - name: older_than_days
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Cleanup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  deleted_count:
                    type: integer

  /audit/integrity/verify:
    get:
      summary: Verify audit integrity
      description: Verify audit log integrity using SHA256 checksums
      operationId: verifyAuditIntegrity
      tags:
        - Audit
      responses:
        '200':
          description: Integrity verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrityVerification'

  /audit/integrity/history:
    get:
      summary: Checksum history
      description: Get the history of audit log integrity checksums
      operationId: auditIntegrityHistory
      tags:
        - Audit
      responses:
        '200':
          description: Checksum history
          content:
            application/json:
              schema:
                type: object
                properties:
                  checksums:
                    type: array
                    items:
                      type: object

  /security/alerts:
    get:
      summary: Get security alerts
      description: Retrieve recent security alerts with optional severity filter
      operationId: getSecurityAlerts
      tags:
        - Audit
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warning, critical]
      responses:
        '200':
          description: Security alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  alerts:
                    type: array
                    items:
                      $ref: '#/components/schemas/SecurityAlert'

  /security/alerts/stats:
    get:
      summary: Security alert statistics
      description: Get aggregate statistics for security alerts
      operationId: securityAlertStats
      tags:
        - Audit
      responses:
        '200':
          description: Alert statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  by_severity:
                    type: object
                    additionalProperties:
                      type: integer
                  by_type:
                    type: object
                    additionalProperties:
                      type: integer

  /pipelines/documentation:
    post:
      summary: Generate documentation
      description: |
        Multi-step documentation pipeline that enhances a prompt with the LLM server,
        structures output via Sequential Thinking MCP server, and writes to
        the Obsidian vault using Desktop Commander.
      operationId: generateDocumentation
      tags:
        - Enhancement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repo_path
              properties:
                repo_path:
                  type: string
                  description: Path to the repository to document
                output_path:
                  type: string
                  description: Output file path (defaults to Obsidian vault)
      responses:
        '200':
          description: Documentation generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  output_path:
                    type: string
        '500':
          description: Pipeline failed

  /dashboard:
    get:
      summary: Monitoring dashboard
      description: HTMX-based real-time monitoring dashboard
      operationId: dashboard
      tags:
        - Dashboard
      responses:
        '200':
          description: Dashboard HTML

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key from configs/api-keys.json (prefix sk-prompthub-{client}-*)
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, down]
        services:
          type: object
          properties:
            router:
              type: string
            llm_server:
              type: string
            cache:
              type: object
              properties:
                status:
                  type: string
                hit_rate:
                  type: number
                size:
                  type: integer
        servers:
          type: object
          properties:
            running:
              type: integer
            stopped:
              type: integer
            failed:
              type: integer

    ServerHealthResponse:
      type: object
      properties:
        server:
          type: string
        status:
          type: string
          enum: [running, stopped, failed, starting]
        pid:
          type: integer
          nullable: true
        restart_count:
          type: integer
        last_error:
          type: string
          nullable: true
        circuit_breaker:
          $ref: '#/components/schemas/CircuitBreakerStats'
        config:
          type: object

    ServerInfo:
      type: object
      properties:
        name:
          type: string
        package:
          type: string
        transport:
          type: string
          enum: [stdio, sse, http]
        status:
          type: string
        pid:
          type: integer
          nullable: true
        auto_start:
          type: boolean
        restart_count:
          type: integer
        description:
          type: string

    ServerDetail:
      type: object
      properties:
        name:
          type: string
        config:
          type: object
        process:
          type: object

    InstallServerRequest:
      type: object
      required:
        - package
      properties:
        package:
          type: string
          description: npm package name
          example: "@upstash/context7-mcp"
        name:
          type: string
          description: Server name (auto-generated from package if omitted)
        auto_start:
          type: boolean
          default: false
        description:
          type: string

    JsonRpcRequest:
      type: object
      required:
        - jsonrpc
        - method
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        method:
          type: string
          example: "tools/call"
        params:
          type: object
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"

    JsonRpcResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        result:
          type: object
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            data:
              type: object
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"

    JsonRpcError:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        error:
          type: object
          properties:
            code:
              type: integer
              example: -32603
            message:
              type: string
            data:
              type: object
        id:
          type: "null"

    EnhanceRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: The prompt to enhance
        bypass_cache:
          type: boolean
          default: false
          description: Skip cache lookup

    EnhanceResponse:
      type: object
      properties:
        original:
          type: string
        enhanced:
          type: string
        model:
          type: string
        cached:
          type: boolean
        was_enhanced:
          type: boolean
        error:
          type: string
          nullable: true

    CircuitBreakerStats:
      type: object
      properties:
        state:
          type: string
          enum: [CLOSED, OPEN, HALF_OPEN]
        failure_count:
          type: integer
        success_count:
          type: integer
        last_failure_time:
          type: number
          nullable: true
        last_success_time:
          type: number
          nullable: true

    ActivityLogResponse:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        entries:
          type: array
          items:
            type: object
            properties:
              request_id:
                type: string
              method:
                type: string
              path:
                type: string
              status:
                type: integer
              duration_ms:
                type: number
              client_id:
                type: string
              client_ip:
                type: string
              timestamp:
                type: string

    SecurityAlert:
      type: object
      properties:
        alert_id:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        alert_type:
          type: string
        message:
          type: string
        timestamp:
          type: string
        context:
          type: object

    IntegrityVerification:
      type: object
      properties:
        valid:
          type: boolean
        message:
          type: string
        current_checksum:
          type: object
        previous_checksum:
          type: object

    Error:
      type: object
      properties:
        detail:
          type: string

    ChatCompletionRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: LLM model name
          example: "qwen3-4b-instruct-2507"
        messages:
          type: array
          items:
            type: object
            required:
              - role
              - content
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        temperature:
          type: number
          default: 0.7
        max_tokens:
          type: integer
          nullable: true
        stream:
          type: boolean
          default: false
        top_p:
          type: number
          nullable: true
        frequency_penalty:
          type: number

    ResponsesRequest:
      type: object
      required:
        - model
        - input
      properties:
        model:
          type: string
          description: LLM model name
          example: "qwen3-4b-instruct-2507"
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
          description: Responses API input as a string or message-like array
        instructions:
          type: string
          nullable: true
        temperature:
          type: number
          nullable: true
          default: 0.7
        max_output_tokens:
          type: integer
          nullable: true
        top_p:
          type: number
          nullable: true
        stream:
          type: boolean
          default: false

    ResponsesContentBlock:
      type: object
      properties:
        type:
          type: string
        text:
          type: string
          nullable: true
        thinking:
          type: string
          nullable: true

    ResponsesOutputMessage:
      type: object
      properties:
        type:
          type: string
          example: message
        role:
          type: string
          example: assistant
        content:
          type: array
          items:
            $ref: '#/components/schemas/ResponsesContentBlock'

    ResponsesResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: response
        created_at:
          type: integer
        model:
          type: string
          example: "qwen3-4b-instruct-2507"
        output:
          type: array
          items:
            $ref: '#/components/schemas/ResponsesOutputMessage'
        output_text:
          type: string
        usage:
          type: object
          nullable: true
          nullable: true
        presence_penalty:
          type: number
          nullable: true
        stop:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          nullable: true
        user:
          type: string
          nullable: true

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: "chat.completion"
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
                enum: [stop, length, null]
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    OpenAIError:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
              enum: [invalid_request_error, server_error]
