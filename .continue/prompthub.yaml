name: PromptHub
version: 0.0.1
schema: v1

models:
  - name: Qwen2.5 Coder via Router
    provider: openai
    model: qwen2.5-coder:32b
    apiBase: http://localhost:9090/v1
    apiKey: sk-prompthub-continue-dev001
    defaultCompletionOptions:
      contextLength: 32768
      temperature: 0.7
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply
  - name: Nomic Embed Text v2 MOE via Router
    provider: ollama
    model: nomic-embed-text:latest
    roles:
      - embed
  - name: Autodetect
    provider: ollama
    model: AUTODETECT
    defaultCompletionOptions:
      contextLength: 262144
    capabilities:
      - tool_use
    roles:
      - autocomplete
      - summarize
      - rerank

